<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NetSage AI Level 4</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background: radial-gradient(circle,#020617,#000); }
.glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); }
.neon { color:#00ffff; text-shadow:0 0 10px #00ffff; }
.alert { animation: pulse 1s infinite; }
@keyframes pulse {
0%{box-shadow:0 0 10px red;}
50%{box-shadow:0 0 30px red;}
100%{box-shadow:0 0 10px red;}
}
</style>
</head>

<body class="text-white p-6 font-sans">

<h1 class="text-4xl neon mb-6">⚡ NetSage AI Level 4</h1>

<input type="file" id="file">
<button onclick="upload()" class="glass px-4 py-2 ml-2 rounded border border-cyan-400">
Analyze
</button>

<!-- METRICS -->
<div class="grid grid-cols-6 gap-4 mt-6">

<div class="glass p-4">Total <h1 id="total"></h1></div>
<div class="glass p-4 text-red-400">High <h1 id="high"></h1></div>
<div class="glass p-4 text-yellow-400">Medium <h1 id="medium"></h1></div>
<div class="glass p-4 text-cyan-400">Anomaly <h1 id="anomaly"></h1></div>
<div class="glass p-4">Risk <h1 id="risk"></h1></div>
<div class="glass p-4 text-purple-400">Score <h1 id="score"></h1></div>

</div>

<!-- CHARTS -->
<div class="grid grid-cols-3 gap-6 mt-6">

<div class="glass p-4">
<h3 class="neon">Severity</h3>
<canvas id="severityChart"></canvas>
</div>

<div class="glass p-4">
<h3 class="neon">Attack Types</h3>
<canvas id="attackChart"></canvas>
</div>

<div class="glass p-4 text-center">
<h3 class="neon">Risk Meter</h3>
<canvas id="riskMeter"></canvas>
</div>

</div>

<!-- TIMELINE -->
<div class="glass p-4 mt-6">
<h3 class="neon">📊 Threat Timeline</h3>
<canvas id="timelineChart"></canvas>
</div>

<!-- ANOMALIES -->
<div class="glass p-4 mt-6">
<h3 class="neon">🚨 Anomalies</h3>
<div id="anomaliesBox"></div>
</div>

<!-- AI -->
<div class="glass p-4 mt-6 rounded-xl">
<h3 class="neon mb-3">🤖 AI Insight</h3>
<div id="ai"></div>
</div>

<script>

let severityChart, attackChart, riskMeter, timelineChart;
let historyData = [];

// 🚀 MAIN FUNCTION
async function upload() {

    let file = document.getElementById("file").files[0];
    if (!file) return alert("Select file");

    document.getElementById("ai").innerText = "🤖 Analyzing...";

    let form = new FormData();
    form.append("file", file);

    let res = await fetch("http://localhost:5000/analyze", {
        method: "POST",
        body: form
    });

    let data = await res.json();

    updateUI(data);
}

// 🧠 UPDATE UI
function updateUI(data){

    // METRICS
    document.getElementById("total").innerText = data.summary.total;
    document.getElementById("high").innerText = data.summary.high;
    document.getElementById("medium").innerText = data.summary.medium;
    document.getElementById("anomaly").innerText = data.summary.anomalies;
    document.getElementById("score").innerText = data.summary.risk_score;

    let riskEl = document.getElementById("risk");
    riskEl.innerText = data.summary.risk_level;

    // 🎨 Risk color
    if(data.summary.risk_level === "HIGH"){
        riskEl.className = "text-red-500 text-xl";
    } else if(data.summary.risk_level === "MEDIUM"){
        riskEl.className = "text-yellow-400 text-xl";
    } else {
        riskEl.className = "text-green-400 text-xl";
    }

    // 🤖 AI (formatted)
    renderAI(data.ai_summary);

    // 🚨 ANOMALIES
    let box = document.getElementById("anomaliesBox");
    box.innerHTML = "";
    data.anomalies.forEach(a => {
        box.innerHTML += `<div class="text-red-400">${a}</div>`;
    });

    // 📊 SEVERITY CHART
    if (severityChart) severityChart.destroy();
    severityChart = new Chart(document.getElementById("severityChart"), {
        type:"doughnut",
        data:{
            labels:["High","Medium","Anomaly"],
            datasets:[{
                data:[
                    data.summary.high,
                    data.summary.medium,
                    data.summary.anomalies
                ],
                backgroundColor:["red","yellow","cyan"]
            }]
        }
    });

    // 🧠 ATTACK TYPES
    if (attackChart) attackChart.destroy();
    attackChart = new Chart(document.getElementById("attackChart"), {
        type:"pie",
        data:{
            labels:Object.keys(data.attack_types || {}),
            datasets:[{
                data:Object.values(data.attack_types || {})
            }]
        }
    });

    // 🔥 RISK METER
    if (riskMeter) riskMeter.destroy();
    riskMeter = new Chart(document.getElementById("riskMeter"), {
        type:"doughnut",
        data:{
            datasets:[{
                data:[
                    data.summary.risk_score,
                    100 - data.summary.risk_score
                ],
                backgroundColor:["red","#222"]
            }]
        },
        options:{ cutout:"80%" }
    });

    // 📈 TIMELINE
    historyData.push(data.summary.high);

    if (timelineChart) timelineChart.destroy();
    timelineChart = new Chart(document.getElementById("timelineChart"), {
        type:"line",
        data:{
            labels:historyData.map((_,i)=>i),
            datasets:[{
                label:"Threat Trend",
                data:historyData
            }]
        }
    });
}

// 🎯 AI FORMAT FUNCTION
function renderAI(text){

    let lines = text.split("\n");
    let html = "";

    lines.forEach(line=>{
        if(line.toLowerCase().includes("threat"))
            html += `<div class="text-red-400 font-bold">🚨 ${line}</div>`;
        else if(line.toLowerCase().includes("cause"))
            html += `<div class="text-yellow-400">🧠 ${line}</div>`;
        else if(line.toLowerCase().includes("fix"))
            html += `<div class="text-green-400">🛠 ${line}</div>`;
        else
            html += `<div>${line}</div>`;
    });

    document.getElementById("ai").innerHTML = html;
}

</script>

</body>
</html>
